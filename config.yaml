inputs:
  customer_test: "data/02_raw/customer_test.csv"
  les_cs: "data/02_raw/les_cs.csv"
  nace_codes: "data/02_raw/nace_codes.csv"
plis_training_csv: "data/02_raw/plis_training.csv"
customer_meta_csv: "data/03_meta/customer.csv"

training_validation_split:
  cutoff_date: "2025-07-01"
  test_customers_count: 50
  random_seed: 42

scoring_parameters:
  savings_rate: 0.10
  fixed_fee_eur: 10.00
  scoring_months: 1

modelling:
  # Which approach drives portfolio and submission (single source of truth)
  active_approach: "lgbm_two_stage"
  # Approaches to run for comparison/diagnostics (all produce scores under data/11_predictions/{mode}/{approach}/)
  enabled_approaches:
    - baseline
    - lgbm_two_stage

  windows:
    train_end: "2024-12-31"
    validation:
      start: "2025-01-01"
      end: "2025-06-30"
      n_min_label: 1
      months: 6.0

  candidates:
    lookback_months: 36
    min_order_frequency: 1
    min_lookback_spend: 20

  selection:
    score_threshold: 0.0
    top_k_per_buyer: 15
    guardrails:
      min_orders: 3
      min_months: 2
      high_spend: 500.0

  features:
    selected:
      - CV_gap
      - active_month_share_12m
      - delta_recency
      - delta_trend
      - first_order_year
      - has_gap_history
      - has_recent_spend_6m
      - historical_purchase_value_sqrt
      - historical_purchase_value_total
      - last_order_month_cos
      - last_order_month_sin
      - last_order_quarter_cos
      - last_order_quarter_sin
      - last_order_year
      - log_employees
      - m_active
      - mu_gap
      - n_orders
      - nace_2
      - nace_code
      - nace_mismatch
      - order_value_cv
      - q4_share
      - recency_to_gap_ratio
      - recent_3m_count
      - recent_6m_count
      - s_median_line
      - secondary_nace_2
      - secondary_nace_code
      - spend_recent_3m
      - spend_recent_ratio

  # Per-approach config (output paths are data/11_predictions/{mode}/{approach}/scores.parquet)
  approaches:
    baseline:
      alpha: 1.0
      beta: 1.0
      gamma: 0.5
    lgbm_two_stage: {}

portal_credentials:
  team: 'AAD'
  password: 'uniteaad'
