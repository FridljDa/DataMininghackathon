# Paths to raw input files
inputs:
  customer_test: "data/02_raw/customer_test.csv"
  les_cs: "data/02_raw/les_cs.csv"
  nace_codes: "data/02_raw/nace_codes.csv"
# Raw PLI source; Snakefile materializes the cleaned file
plis_training_csv: "data/02_raw/plis_training.csv"
# Output path for built customer metadata (all buyers + task labels)
customer_meta_csv: "data/03_meta/customer.csv"

# Schema and validation for cleaning raw PLI data
cleaning:
  plis_training:
    # Column names to keep from raw CSV (others dropped)
    keep_columns:
      - orderdate
      - legal_entity_id
      - set_id
      - sku
      - eclass
      - manufacturer
      - quantityvalue
      - vk_per_item
      - estimated_number_employees
      - nace_code
      - secondary_nace_code

    # Per-column type, validation and null handling
    columns:
      legal_entity_id:
        type: string
        strip: true
        required: true

      orderdate:
        type: date
        format: "%Y-%m-%d"
        required: true

      set_id:
        type: string
        strip: true
        empty_as_null: true

      sku:
        type: string
        strip: true
        required: true

      eclass:
        type: string
        strip: true
        empty_as_null: true
        required: true

      manufacturer:
        type: string
        strip: true
        empty_as_null: true

      quantityvalue:
        type: float
        required: true
        min_exclusive: 0

      vk_per_item:
        type: float
        required: true
        min_exclusive: 0

      estimated_number_employees:
        type: float
        min_inclusive: 0

      nace_code:
        type: string
        strip: true
        empty_as_null: true

      secondary_nace_code:
        type: string
        strip: true
        empty_as_null: true

    # Rows with identical values in these columns are deduplicated
    deduplicate:
      subset:
        - legal_entity_id
        - orderdate
        - set_id
        - sku
        - eclass
        - manufacturer
        - quantityvalue
        - vk_per_item

# How to split data into training vs validation (offline evaluation)
training_validation_split:
  # PLIs on or after this date for test buyers go to plis_testing
  cutoff_date: "2025-07-01"
  # Number of "none-task" buyers relabeled to testing for offline validation
  test_customers_count: 50
  random_seed: 42

# Used in EU score and offline/local scoring
scoring_parameters:
  # Approximate savings fraction (local validation; not the black-box formula)
  savings_rate: 0.10
  # Fixed fee per predicted element per month (EUR)
  fixed_fee_eur: 10.00
  # Holdout window length; used to normalize per-month score
  scoring_months: 6

modelling:
  # Which approaches run; each produces portfolio/submission under data/11_predictions, 12_portfolio, 13_submission, 14_scores by {mode}/{approach}/
  enabled_approaches:
    #- baseline
    - lgbm_two_stage
    #- pass_through
    - phase3_repro
  # Submission levels: 1 = eclass only, 2 = eclass|manufacturer
  enabled_levels:
    - 1
    - 2

  # Time windows for training and validation
  windows:
    # Upper bound for training data
    train_end: "2025-12-31"
    validation:
      # Held-out period for offline label generation
      start: "2025-01-01"
      end: "2025-06-30"
      # Buyer-eclass is positive if at least this many orders in validation
      n_min_label: 1
      # Used to normalize scores to per-month
      months: 6.0

  # How candidate (buyer, eclass) pairs are built from history
  candidates:
    # How far back (months) to look for purchase history
    lookback_months: 60
    # Minimum number of orders in lookback to qualify as candidate
    min_order_frequency: 1
    # Minimum EUR spend in lookback (0 = no filter)
    min_lookback_spend: 0

  # Selection policy: threshold, guardrails, per-buyer cap. For pass_through use score_threshold <= 0, min_orders/min_months 1, high_spend 0, top_k_per_buyer large (e.g. 9999).
  selection:
    # Keep only pairs with EU score above this
    score_threshold: 0.0
    # Max predictions per buyer (hard cap)
    top_k_per_buyer: 25
    # At least one guardrail must pass for a pair to be included
    guardrails:
      # Pass if n_orders >= this
      min_orders: 2
      # Pass if purchased in at least this many distinct months
      min_months: 2
      # Pass if total historical spend >= this (EUR)
      high_spend: 200
      # 0 = disabled; when > 0, pass if avg_monthly_spend_buyer_tenure >= this (late joiners)
      min_avg_monthly_spend: 0

  # Per-feature missing-value handling for features_raw (before derived engineering). Actions: drop_row, ignore, fill (use value for constant). Unlisted features use default_action.
  missing_value_sanitation:
    default_action: ignore
    features:
      legal_entity_id: { action: drop_row }
      eclass: { action: drop_row }
      orderdate_min: { action: drop_row }
      orderdate_max: { action: drop_row }
      orderdates_str: { action: drop_row }
      n_orders: { action: fill, strategy: constant, value: 0 }
      historical_purchase_value_total: { action: fill, strategy: constant, value: 0.0 }

  # Feature names passed to modelling (after feature_selection filter); guardrail columns n_orders, m_active, historical_purchase_value_total retained for selection step
  features:
    selected:
      - CV_gap
      - avg_monthly_orders_pair_tenure
      - avg_monthly_spend_pair_tenure
      - avg_spend_per_order
      - buyer_tenure_months
      - delta_vs_expected_gap
      - effective_lookback_months
      - first_order_year
      - is_overdue
      - last_order_month_cos
      - last_order_month_sin
      - last_order_quarter_cos
      - last_order_quarter_sin
      - last_order_year
      - log_employees
      - n_orders
      - historical_purchase_value_total
      - nace_2
      - nace_3
      - nace_code
      - nace_mismatch
      - nace_section
      - q4_share
      - rho_freq
      - secondary_nace_2
      - secondary_nace_code

  # Per-approach hyperparameters (output paths: data/11_predictions/{mode}/{approach}/scores.parquet)
  approaches:
    baseline:
      alpha: 1.0
      beta: 1.0
      gamma: 0.5
    lgbm_two_stage:
      # JSON override for LGBMClassifier (recurrence); empty = use code defaults
      lgb_params_classifier: '{"num_leaves": 63, "n_estimators": 300, "learning_rate": 0.05, "min_child_samples": 10, "reg_alpha": 0.1, "reg_lambda": 1.0}'
      # JSON override for LGBMRegressor (value given recurrence); empty = use code defaults
      lgb_params_regressor: '{"num_leaves": 63, "n_estimators": 300, "learning_rate": 0.05, "min_child_samples": 10, "reg_alpha": 0.1, "reg_lambda": 1.0}'
    pass_through: {}
    phase3_repro:
      # Min orders in lookback to pass gate
      eta: 2
      # Min spend in lookback to pass gate (EUR)
      tau: 100.0
      # Multiplier for eta when buyer has sparse history
      sparse_eta_multiplier: 3
      # Multiplier for tau when buyer has sparse history
      sparse_tau_multiplier: 2.0
      # If true, score uses avg_monthly_*_in_lookback for tenure fairness
      use_monthly_lookback_rates: false

# Submission / cold-start behaviour
submission:
  # Max eclasses/clusters per cold-start buyer (lift-based NACE ranking)
  cold_start_top_k: 30

# Credentials for uploading to competition portal
portal_credentials:
  team: 'AAD'
  password: 'uniteaad'
