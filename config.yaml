inputs:
  customer_test: data/02_raw/customer_test.csv
  features_per_sku: data/02_raw/features_per_sku.csv
  les_cs: data/02_raw/les_cs.csv
  nace_codes: data/02_raw/nace_codes.csv
plis_training_csv: data/02_raw/plis_training.csv
customer_meta_csv: data/03_meta/customer.csv
cleaning:
  plis_training:
    keep_columns:
    - orderdate
    - legal_entity_id
    - set_id
    - sku
    - eclass
    - manufacturer
    - quantityvalue
    - vk_per_item
    - estimated_number_employees
    - nace_code
    - secondary_nace_code
    columns:
      legal_entity_id:
        type: string
        strip: true
        required: true
      orderdate:
        type: date
        format: '%Y-%m-%d'
        required: true
      set_id:
        type: string
        strip: true
        empty_as_null: true
      sku:
        type: string
        strip: true
        required: true
      eclass:
        type: string
        strip: true
        empty_as_null: true
        required: true
      manufacturer:
        type: string
        strip: true
        empty_as_null: true
      quantityvalue:
        type: float
        required: true
        min_exclusive: 0
      vk_per_item:
        type: float
        required: true
        min_exclusive: 0
      estimated_number_employees:
        type: float
        min_inclusive: 0
      nace_code:
        type: string
        strip: true
        empty_as_null: true
      secondary_nace_code:
        type: string
        strip: true
        empty_as_null: true
    deduplicate:
      subset:
      - legal_entity_id
      - orderdate
      - set_id
      - sku
      - eclass
      - manufacturer
      - quantityvalue
      - vk_per_item
training_validation_split:
  cutoff_date: '2025-07-01'
  test_customers_count: 1
  random_seed: 42
scoring_parameters:
  savings_rate: 0.1
  fixed_fee_eur: 10.0
  scoring_months: 6
modelling:
  enabled_approaches:
  - lgbm_two_stage
  enabled_levels:
  - 1
  - 2
  windows:
    train_end: '2025-12-31'
    validation:
      start: '2025-01-01'
      end: '2025-06-30'
      n_min_label: 1
      months: 6.0
  candidates:
    lookback_months: 60
    min_order_frequency: 1
    min_lookback_spend: 0
  selection:
    score_threshold: 0.0
    top_k_per_buyer: 400
    guardrails:
      min_orders: 0
      min_months: 1
      high_spend: 0
      min_avg_monthly_spend: 0
    by_level:
      1:
        score_threshold: 0.0
        top_k_per_buyer: 400
        guardrails:
          min_orders: 0
          min_months: 1
          high_spend: 0
          min_avg_monthly_spend: 0
      2:
        score_threshold: 0.0
        top_k_per_buyer: 400
        guardrails: &id001
          min_orders: 0
          min_months: 1
          high_spend: 0
          min_avg_monthly_spend: 0
      '1':
        score_threshold: -0.02
        top_k_per_buyer: 400
        guardrails:
          min_orders: 0
          min_months: 1
          high_spend: 0
          min_avg_monthly_spend: 0
      '2':
        score_threshold: 0.0
        top_k_per_buyer: 400
        guardrails: *id001
  features_per_sku:
    top_k_keys: 20
    top_k_values_per_key: 10
    chunksize: 200000
  missing_value_sanitation:
    default_action: ignore
    features:
      legal_entity_id:
        action: drop_row
      eclass:
        action: drop_row
      manufacturer:
        action: drop_row
      n_orders:
        action: fill
        strategy: constant
        value: 0
      historical_purchase_value_total:
        action: fill
        strategy: constant
        value: 0.0
  features:
    selected:
    - CV_gap
    - avg_price_per_unit
    - avg_monthly_orders_pair_tenure
    - avg_monthly_spend_pair_tenure
    - avg_spend_per_order
    - buyer_tenure_months
    - delta_vs_expected_gap
    - first_order_year
    - is_overdue
    - last_order_month_cos
    - last_order_month_sin
    - last_order_quarter_cos
    - last_order_quarter_sin
    - log_employees
    - n_orders
    - historical_purchase_value_total
    - nace_2
    - nace_3
    - nace_code
    - nace_mismatch
    - nace_section
    - q4_share
    - rho_freq
    - secondary_nace_2
    - secondary_nace_code
    - years_since_last_order
    - top_manufacturer_share
    - n_distinct_manufacturers
    - eclass_n_buyers_global
    - avg_price_per_unit
  approaches:
    baseline:
      alpha: 1.0
      beta: 1.0
      gamma: 0.5
    lgbm_two_stage:
      lgb_params_classifier: '{"num_leaves": 63, "n_estimators": 300, "learning_rate":
        0.05, "min_child_samples": 10, "reg_alpha": 0.1, "reg_lambda": 1.0}'
      lgb_params_regressor: '{"num_leaves": 63, "n_estimators": 300, "learning_rate":
        0.05, "min_child_samples": 10, "reg_alpha": 0.1, "reg_lambda": 1.0}'
      min_positive_samples_for_regressor: 10
    pass_through:
      score_base_constant: 1.0
    lgbm_v3_factorized:
      lgb_params_classifier: '{"objective": "tweedie", "tweedie_variance_power": 1.5,
        "num_leaves": 63, "n_estimators": 300, "learning_rate": 0.05, "min_child_samples":
        10, "reg_alpha": 0.1, "reg_lambda": 1.0}'
    phase3_repro:
      eta: 2
      tau: 100.0
      sparse_eta_multiplier: 3
      sparse_tau_multiplier: 2.0
      use_monthly_lookback_rates: false
      recency_decay_days: 365.0
submission:
  cold_start_top_k: 200
  by_level:
    1:
      cold_start_top_k: 50
    2:
      cold_start_top_k: 200
    '1':
      cold_start_top_k: 50
    '2':
      cold_start_top_k: 200
portal_credentials:
  team: AAD
  password: uniteaad
