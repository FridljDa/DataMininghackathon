inputs:
  customer_test: "data/02_raw/customer_test.csv"
  les_cs: "data/02_raw/les_cs.csv"
  nace_codes: "data/02_raw/nace_codes.csv"
plis_training_csv: "data/02_raw/plis_training.csv"
customer_meta_csv: "data/03_meta/customer.csv"

training_validation_split:
  cutoff_date: "2025-07-01"
  test_customers_count: 50
  random_seed: 42

scoring_parameters:
  savings_rate: 0.10
  fixed_fee_eur: 10.00
  scoring_months: 1

modelling:
  # All enabled approaches run through selection and produce portfolio/submission per approach (data/11_predictions, 12_portfolio, 13_submission, 14_scores by {mode}/{approach}/).
  enabled_approaches:
   # - baseline
   # - lgbm_two_stage
   # - pass_through
    - phase3_repro

  windows:
    train_end: "2025-12-31"
    validation:
      start: "2025-01-01"
      end: "2025-06-30"
      n_min_label: 1
      months: 6.0

  candidates:
    lookback_months: 18
    min_order_frequency: 2
    min_lookback_spend: 100

  # For pass_through approach, use score_threshold <= 0, min_orders/min_months 1, high_spend 0, top_k_per_buyer large (e.g. 9999) so portfolio = candidates.
  selection:
    score_threshold: 0.0
    top_k_per_buyer: 9999
    guardrails:
      min_orders: 1
      min_months: 1
      high_spend: 0
      min_avg_monthly_spend: 0  # 0 = disabled; when > 0, pass if avg_monthly_spend_buyer_tenure >= this (late joiners)

  # Per-feature missing-value handling for features_raw (before derived engineering).
  # Actions: drop_row (drop rows where feature is null), ignore (leave as-is), fill (impute).
  # For fill: strategy = constant | median | mean | mode; use value for constant.
  # Features not listed use default_action.
  missing_value_sanitation:
    default_action: ignore
    features: {}
    # Example entries (uncomment and add under features:):
    #   legal_entity_id: { action: drop_row }
    #   historical_purchase_value_total: { action: fill, strategy: median }
    #   n_orders: { action: fill, strategy: constant, value: 0 }

  features:
    selected:
      - CV_gap
      - active_month_share_12m
      - delta_recency
      - delta_trend
      - first_order_year
      - has_gap_history
      - has_recent_spend_6m
      - historical_purchase_value_sqrt
      - historical_purchase_value_total
      - last_order_month_cos
      - last_order_month_sin
      - last_order_quarter_cos
      - last_order_quarter_sin
      - last_order_year
      - log_employees
      - m_active
      - mu_gap
      - n_orders
      - nace_2
      - nace_code
      - nace_mismatch
      - order_value_cv
      - q4_share
      - recency_to_gap_ratio
      - recent_3m_count
      - recent_6m_count
      - s_median_line
      - secondary_nace_2
      - secondary_nace_code
      - spend_recent_3m
      - spend_recent_ratio
      - n_orders_in_lookback
      - lookback_spend
      - avg_spend_per_order
      - days_since_last
      - history_cohort
      - buyer_tenure_months
      - pair_tenure_months
      - effective_lookback_months
      - avg_monthly_orders_buyer_tenure
      - avg_monthly_orders_pair_tenure
      - avg_monthly_spend_buyer_tenure
      - avg_monthly_spend_pair_tenure
      - avg_monthly_orders_in_lookback
      - avg_monthly_spend_in_lookback

  # Per-approach config (output paths are data/11_predictions/{mode}/{approach}/scores.parquet)
  approaches:
    baseline:
      alpha: 1.0
      beta: 1.0
      gamma: 0.5
    lgbm_two_stage: {}
    pass_through: {}
    phase3_repro:
      eta: 2
      tau: 100.0
      sparse_eta_multiplier: 3
      sparse_tau_multiplier: 2.0
      use_monthly_lookback_rates: false  # if true, score uses avg_monthly_*_in_lookback for tenure fairness

portal_credentials:
  team: 'AAD'
  password: 'uniteaad'
