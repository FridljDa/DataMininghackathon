inputs:
  customer_test: "data/02_raw/customer_test.csv"
  les_cs: "data/02_raw/les_cs.csv"
  nace_codes: "data/02_raw/nace_codes.csv"
plis_training_csv: "data/02_raw/plis_training.csv"  # Raw source; Snakefile materializes the cleaned file.
customer_meta_csv: "data/03_meta/customer.csv"

cleaning:
  plis_training:
    keep_columns:
      - orderdate
      - legal_entity_id
      - set_id
      - sku
      - eclass
      - manufacturer
      - quantityvalue
      - vk_per_item
      - estimated_number_employees
      - nace_code
      - secondary_nace_code

    columns:
      legal_entity_id:
        type: string
        strip: true
        required: true

      orderdate:
        type: date
        format: "%Y-%m-%d"
        required: true

      set_id:
        type: string
        strip: true
        empty_as_null: true

      sku:
        type: string
        strip: true
        required: true

      eclass:
        type: string
        strip: true
        empty_as_null: true
        required: true

      manufacturer:
        type: string
        strip: true
        empty_as_null: true

      quantityvalue:
        type: float
        required: true
        min_exclusive: 0

      vk_per_item:
        type: float
        required: true
        min_exclusive: 0

      estimated_number_employees:
        type: float
        min_inclusive: 0

      nace_code:
        type: string
        strip: true
        empty_as_null: true

      secondary_nace_code:
        type: string
        strip: true
        empty_as_null: true

    deduplicate:
      subset:
        - legal_entity_id
        - orderdate
        - set_id
        - sku
        - eclass
        - manufacturer
        - quantityvalue
        - vk_per_item

training_validation_split:
  cutoff_date: "2025-07-01"
  test_customers_count: 50
  random_seed: 42

scoring_parameters:
  savings_rate: 0.10
  fixed_fee_eur: 10.00
  scoring_months: 6  # holdout plis_testing is 6 months; normalize to per-month score

modelling:
  # All enabled approaches run through selection and produce portfolio/submission per approach (data/11_predictions, 12_portfolio, 13_submission, 14_scores by {mode}/{approach}/).
  enabled_approaches:
    - baseline
    - lgbm_two_stage
    - pass_through
    - phase3_repro
  enabled_levels:
    - 1
    - 2

  windows:
    train_end: "2025-12-31"
    validation:
      start: "2025-01-01"
      end: "2025-06-30"
      n_min_label: 1
      months: 6.0

  candidates:
    lookback_months: 60
    min_order_frequency: 1
    min_lookback_spend: 0

  # For pass_through approach, use score_threshold <= 0, min_orders/min_months 1, high_spend 0, top_k_per_buyer large (e.g. 9999) so portfolio = candidates.
  selection:
    score_threshold: 0.0
    top_k_per_buyer: 15
    guardrails:
      min_orders: 3
      min_months: 2
      high_spend: 500
      min_avg_monthly_spend: 0  # 0 = disabled; when > 0, pass if avg_monthly_spend_buyer_tenure >= this (late joiners)

  # Per-feature missing-value handling for features_raw (before derived engineering).
  # Actions: drop_row (drop rows where feature is null), ignore (leave as-is), fill (impute).
  # For fill: strategy = constant | median | mean | mode; use value for constant.
  # Features not listed use default_action.
  missing_value_sanitation:
    default_action: ignore
    features:
      legal_entity_id: { action: drop_row }
      eclass: { action: drop_row }
      orderdate_min: { action: drop_row }
      orderdate_max: { action: drop_row }
      orderdates_str: { action: drop_row }
      n_orders: { action: fill, strategy: constant, value: 0 }
      historical_purchase_value_total: { action: fill, strategy: constant, value: 0.0 }

  features:
    selected:
      - n_orders
      - CV_gap
      - active_month_share_12m
      - active_year_span
      - avg_spend_per_order
      - days_since_last
      - delta_recency
      - delta_vs_expected_gap
      - has_gap_history
      - has_multi_year_history
      - history_cohort
      - historical_purchase_value_total
      - is_overdue
      - last_order_month_cos
      - last_order_month_sin
      - last_order_quarter_cos
      - last_order_quarter_sin
      - last_order_year
      - log_employees
      - m_observed
      - n_orders_in_lookback
      - lookback_spend
      - nace_2
      - nace_code
      - nace_mismatch
      - order_value_cv
      - q4_share
      - recency_to_gap_ratio
      - s_median_line
      - secondary_nace_2
      - secondary_nace_code
      - sigma_gap

  # Per-approach config (output paths are data/11_predictions/{mode}/{approach}/scores.parquet)
  approaches:
    baseline:
      alpha: 1.0
      beta: 1.0
      gamma: 0.5
    lgbm_two_stage: {}
    pass_through: {}
    phase3_repro:
      eta: 2
      tau: 100.0
      sparse_eta_multiplier: 3
      sparse_tau_multiplier: 2.0
      use_monthly_lookback_rates: false  # if true, score uses avg_monthly_*_in_lookback for tenure fairness

submission:
  cold_start_top_k: 30  # max eclasses/clusters per cold-start buyer (lift-based NACE ranking)

portal_credentials:
  team: 'AAD'
  password: 'uniteaad'
